{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="mb-0 fw-bold">Dashboard</h2>
        <small class="text-muted">Visão geral do sistema de Helpdesk</small>
    </div>

    <div>
        <a href="{{ url_for('main.tickets') }}" class="btn btn-outline-secondary me-2">Ver Chamados</a>
        <a href="{{ url_for('main.ticket_new') }}" class="btn btn-success">
            + Novo Chamado
        </a>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-3">
        <div class="card shadow-sm border-0 bg-primary text-white">
            <div class="card-body">
                <h6>Total</h6>
                <h2 class="mb-0">{{ total_tickets }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm border-0 bg-warning text-white">
            <div class="card-body">
                <h6>Abertos</h6>
                <h2 class="mb-0">{{ open_tickets }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm border-0 bg-info text-white">
            <div class="card-body">
                <h6>Em atendimento</h6>
                <h2 class="mb-0">{{ progress_tickets }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm border-0 bg-success text-white">
            <div class="card-body">
                <h6>Fechados</h6>
                <h2 class="mb-0">{{ closed_tickets }}</h2>
            </div>
        </div>
    </div>
</div>

{% endblock %}
