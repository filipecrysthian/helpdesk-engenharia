{% extends "base.html" %}

{% block content %}

<div class="mb-5">
    <h2 class="mb-0 fw-bold">Relatórios e KPI</h2>
    <small class="text-muted">Extração de dados para análise de performance</small>
</div>

<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6 col-xl-5">

        <div class="card shadow-sm">
            <div class="card-header bg-transparent border-bottom px-4 py-3">
                <div class="d-flex align-items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="text-primary">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <h5 class="mb-0 fw-bold">Gerar Relatório de Chamados</h5>
                </div>
            </div>

            <div class="card-body p-4">
                <form method="GET" action="{{ url_for('main.reports') }}">
                    <input type="hidden" name="export" value="csv">

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold text-muted small text-uppercase">Data Inicial</label>
                            <input type="date" name="data_inicial" class="form-control" required>
                        </div>

                        <div class="col-6">
                            <label class="form-label fw-semibold text-muted small text-uppercase">Data Final</label>
                            <input type="date" name="data_final" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-muted small text-uppercase">Área de Engenharia</label>
                        <select name="area" class="form-select">
                            <option value="">Todas as Áreas</option>
                            <option value="Engenharia de Teste">Engenharia de Teste</option>
                            <option value="Engenharia SMT">Engenharia SMT</option>
                            <option value="Engenharia de Processo">Engenharia de Processo</option>
                        </select>
                        <div class="form-text mt-1">Deixe em branco para exportar dados de todas as áreas.</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold d-flex align-items-center justify-content-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                            <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                        </svg>
                        Baixar Relatório CSV
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
